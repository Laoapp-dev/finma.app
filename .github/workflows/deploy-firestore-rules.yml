name: Deploy Firestore Rules

# This is what actually publishes firestore.rules to your live Firestore
# database. Having the correct rules sitting in the repo does nothing on
# its own — Firestore only enforces whatever rules were last *deployed*
# through the Firebase CLI/console. Without this workflow, the project's
# rules were never being pushed anywhere, which is why every read/write
# was failing with "Missing or insufficient permissions" (Firestore was
# still running its original locked-down default rules).

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - ".github/workflows/deploy-firestore-rules.yml"
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${{ runner.temp }}/firebase-sa.json"

      - name: Deploy Firestore rules & indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            --non-interactive
