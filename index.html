<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finma — Learn English from YouTube</title>

<!-- PWA / installable-on-phone support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finma">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<!-- Free, keyless AI helper used by the admin "AI Assist" buttons (vocabulary
     + question generation). No API key or server needed; if it can't load
     (offline / blocked), the app falls back to a built-in keyword scan. -->
<script src="https://js.puter.com/v2/"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="#/" class="brand">
      <img src="icons/icon-192.png" alt="" class="brand-mark" width="28" height="28">
      <span class="brand-name">Finma</span>
    </a>
    <nav id="nav" class="nav"></nav>
  </div>
</header>

<main id="app"></main>

<footer class="footer">
  <p>Finma — practice English by echoing real YouTube speech. Data lives in this browser only.</p>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="js/app.js"></script>
</body>
</html>
